<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOC — WebSocket Test Console</title>
  <style>
    :root {
      --bg:       #0a0e1a;
      --surface:  #111827;
      --border:   #1f2d45;
      --cyan:     #00d4ff;
      --green:    #00ff88;
      --yellow:   #ffd600;
      --red:      #ff3860;
      --critical: #ff00ff;
      --text:     #c9d1e0;
      --dim:      #4a5568;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    header h1 {
      color: var(--cyan);
      font-size: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── Auth form ───────────────────────────────────────────────────────── */
    .auth-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .auth-group label { color: var(--dim); font-size: 11px; }

    .auth-group input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--cyan);
      padding: 4px 8px;
      border-radius: 3px;
      font-family: inherit;
      font-size: 12px;
      width: 110px;
    }

    /* ── Controls ────────────────────────────────────────────────────────── */
    .controls { display: flex; gap: 8px; margin-left: auto; }

    button {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--cyan);
      padding: 5px 14px;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 1px;
      transition: background 0.15s;
    }
    button:hover  { background: rgba(0,212,255,0.08); }
    button.active { border-color: var(--cyan); background: rgba(0,212,255,0.12); }
    button.danger { color: var(--red); border-color: var(--red); }
    button.danger:hover { background: rgba(255,56,96,0.1); }

    /* ── THREATCON badge ──────────────────────────────────────────────────── */
    #threatcon-badge {
      padding: 4px 14px;
      border-radius: 3px;
      font-weight: bold;
      font-size: 13px;
      letter-spacing: 2px;
      border: 1px solid;
      transition: all 0.4s ease;
    }
    .tc-GREEN    { color: var(--green);    border-color: var(--green);    background: rgba(0,255,136,0.07); }
    .tc-YELLOW   { color: var(--yellow);   border-color: var(--yellow);   background: rgba(255,214,0,0.07); }
    .tc-RED      { color: var(--red);      border-color: var(--red);      background: rgba(255,56,96,0.07); }
    .tc-CRITICAL { color: var(--critical); border-color: var(--critical); background: rgba(255,0,255,0.07);
                   animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,0,255,0.4); }
      50%       { box-shadow: 0 0 12px 4px rgba(255,0,255,0.2); }
    }

    /* ── Main layout ─────────────────────────────────────────────────────── */
    main {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      overflow: hidden;
    }

    /* ── Channel panels ──────────────────────────────────────────────────── */
    .channel {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .channel-header {
      background: var(--surface);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .channel-title {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .channel-title.alerts   { color: var(--red); }
    .channel-title.events   { color: var(--cyan); }
    .channel-title.threatcon{ color: var(--yellow); }

    .channel-url {
      color: var(--dim);
      font-size: 10px;
      margin-left: auto;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--dim);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.connected    { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.disconnected { background: var(--red); }
    .status-dot.connecting   { background: var(--yellow); animation: blink 0.8s infinite; }

    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    .msg-count {
      margin-left: 6px;
      color: var(--dim);
      font-size: 10px;
    }

    /* ── Log area ────────────────────────────────────────────────────────── */
    .log {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      scroll-behavior: smooth;
    }

    .log-entry {
      padding: 5px 14px;
      border-left: 2px solid transparent;
      transition: background 0.15s;
      cursor: default;
      line-height: 1.5;
    }
    .log-entry:hover { background: rgba(255,255,255,0.03); }

    .log-entry.type-connected  { border-color: var(--green);  }
    .log-entry.type-alert      { border-color: var(--red);    }
    .log-entry.type-event      { border-color: var(--cyan);   }
    .log-entry.type-threatcon  { border-color: var(--yellow); }
    .log-entry.type-ping       { border-color: var(--dim); opacity: 0.4; }
    .log-entry.type-error      { border-color: var(--red); color: var(--red); }
    .log-entry.type-info       { border-color: var(--dim); color: var(--dim); }

    .log-ts   { color: var(--dim); font-size: 10px; }
    .log-type { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; font-weight: bold; margin: 0 6px; }
    .log-body { color: var(--text); }

    .log-entry.type-alert   .log-type { color: var(--red); }
    .log-entry.type-event   .log-type { color: var(--cyan); }
    .log-entry.type-threatcon .log-type { color: var(--yellow); }
    .log-entry.type-connected .log-type { color: var(--green); }

    /* Alert highlight flash */
    @keyframes flash-red {
      0%   { background: rgba(255,56,96,0.18); }
      100% { background: transparent; }
    }
    .log-entry.type-alert { animation: flash-red 1.2s ease-out; }

    /* ── JSON pretty ─────────────────────────────────────────────────────── */
    details { margin-top: 3px; }
    summary { cursor: pointer; color: var(--dim); font-size: 10px; }
    pre {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 6px 10px;
      margin-top: 4px;
      font-size: 11px;
      overflow-x: auto;
      color: var(--text);
      white-space: pre-wrap;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <h1>◈ SOC — WebSocket Test Console</h1>

  <div class="auth-group">
    <label>USER</label>
    <input id="inp-user" type="text"     value="admin"  autocomplete="off">
    <label>PASS</label>
    <input id="inp-pass" type="password" value=""       autocomplete="off" placeholder="dashboard_password">
  </div>

  <span id="threatcon-badge" class="tc-GREEN">◉ GREEN</span>

  <div class="controls">
    <button id="btn-connect" class="active" onclick="connectAll()">CONNECT ALL</button>
    <button id="btn-clear"                  onclick="clearAll()">CLEAR</button>
    <button id="btn-disconnect" class="danger" onclick="disconnectAll()">DISCONNECT</button>
  </div>
</header>

<main>
  <!-- Alerts channel -->
  <div class="channel">
    <div class="channel-header">
      <div class="status-dot" id="dot-alerts"></div>
      <span class="channel-title alerts">Alerts</span>
      <span class="msg-count" id="count-alerts">0 msgs</span>
      <span class="channel-url">/ws/alerts</span>
    </div>
    <div class="log" id="log-alerts"></div>
  </div>

  <!-- Events channel -->
  <div class="channel">
    <div class="channel-header">
      <div class="status-dot" id="dot-events"></div>
      <span class="channel-title events">Events</span>
      <span class="msg-count" id="count-events">0 msgs</span>
      <span class="channel-url">/ws/events</span>
    </div>
    <div class="log" id="log-events"></div>
  </div>

  <!-- Threatcon channel -->
  <div class="channel">
    <div class="channel-header">
      <div class="status-dot" id="dot-threatcon"></div>
      <span class="channel-title threatcon">Threatcon</span>
      <span class="msg-count" id="count-threatcon">0 msgs</span>
      <span class="channel-url">/ws/threatcon</span>
    </div>
    <div class="log" id="log-threatcon"></div>
  </div>
</main>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const sockets  = { alerts: null, events: null, threatcon: null };
const counts   = { alerts: 0,    events: 0,    threatcon: 0 };
const MAX_ENTRIES = 200;  // max log entries per channel before pruning

// ── Auth token ────────────────────────────────────────────────────────────────
function getToken() {
  const user = document.getElementById('inp-user').value.trim();
  const pass = document.getElementById('inp-pass').value;
  return btoa(`${user}:${pass}`);
}

// ── WebSocket URL ─────────────────────────────────────────────────────────────
function wsUrl(channel) {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const host  = location.host;
  return `${proto}://${host}/ws/${channel}?token=${encodeURIComponent(getToken())}`;
}

// ── Connection management ─────────────────────────────────────────────────────
function connectAll() {
  ['alerts', 'events', 'threatcon'].forEach(connect);
}

function disconnectAll() {
  ['alerts', 'events', 'threatcon'].forEach(ch => {
    if (sockets[ch]) sockets[ch].close(1000, 'user_disconnect');
  });
}

function clearAll() {
  ['alerts', 'events', 'threatcon'].forEach(ch => {
    document.getElementById(`log-${ch}`).innerHTML = '';
    counts[ch] = 0;
    document.getElementById(`count-${ch}`).textContent = '0 msgs';
  });
}

function connect(channel) {
  // Close existing connection if any
  if (sockets[channel]) {
    sockets[channel].onclose = null;
    sockets[channel].close();
  }

  setDot(channel, 'connecting');

  const ws = new WebSocket(wsUrl(channel));
  sockets[channel] = ws;

  ws.onopen = () => setDot(channel, 'connected');

  ws.onmessage = (evt) => {
    let data;
    try { data = JSON.parse(evt.data); } catch { return; }
    handleMessage(channel, data);
  };

  ws.onerror = () => appendEntry(channel, 'error', 'Connection error');

  ws.onclose = (evt) => {
    setDot(channel, 'disconnected');
    if (evt.code === 1008) {
      appendEntry(channel, 'error', `Auth rejected (1008) — check credentials`);
    } else if (evt.code !== 1000) {
      appendEntry(channel, 'info', `Closed (code ${evt.code}) — reconnecting in 5s`);
      setTimeout(() => connect(channel), 5000);
    }
  };
}

// ── Message handler ────────────────────────────────────────────────────────────
function handleMessage(channel, data) {
  const type = data.type || 'unknown';

  // THREATCON badge update
  if (type === 'threatcon') {
    updateThreatcon(data.level);
  }

  // Suppress ping entries from log unless you want them (uncomment)
  // if (type === 'ping') return;

  counts[channel]++;
  document.getElementById(`count-${channel}`).textContent = `${counts[channel]} msgs`;

  appendEntry(channel, `type-${type}`, buildSummary(type, data), data);

  // Prune old entries
  const log = document.getElementById(`log-${channel}`);
  while (log.children.length > MAX_ENTRIES) log.removeChild(log.firstChild);

  // Auto-scroll to bottom
  log.scrollTop = log.scrollHeight;
}

function buildSummary(type, data) {
  switch (type) {
    case 'connected':
      return `Connected to channel "${data.channel}" — THREATCON: ${data.threatcon}`;
    case 'alert':
      return `[${data.risk_score?.toFixed(1) ?? '?'}] ${data.title ?? data.category} · ${data.source_ip ?? ''}`;
    case 'event':
      return `${data.event_type} · ${data.severity?.toUpperCase() ?? ''} · score ${data.risk_score?.toFixed(1) ?? '?'} · ${data.source_ip ?? ''}`;
    case 'threatcon':
      return `${data.previous ?? '?'} → ${data.level}`;
    case 'ping':
      return `ping`;
    default:
      return JSON.stringify(data).slice(0, 120);
  }
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
function appendEntry(channel, cssType, summary, raw) {
  const log = document.getElementById(`log-${channel}`);
  const ts  = new Date().toISOString().slice(11, 23);

  const entry = document.createElement('div');
  entry.className = `log-entry ${cssType}`;

  const typeLabel = cssType.replace('type-', '');

  entry.innerHTML = `
    <span class="log-ts">${ts}</span>
    <span class="log-type">${typeLabel}</span>
    <span class="log-body">${escHtml(summary)}</span>
    ${raw && typeLabel !== 'ping' && typeLabel !== 'info' && typeLabel !== 'error'
      ? `<details><summary>JSON</summary><pre>${escHtml(JSON.stringify(raw, null, 2))}</pre></details>`
      : ''}
  `;

  log.appendChild(entry);
}

function setDot(channel, state) {
  const dot = document.getElementById(`dot-${channel}`);
  dot.className = `status-dot ${state}`;
}

function updateThreatcon(level) {
  const badge = document.getElementById('threatcon-badge');
  badge.className = `tc-${level}`;
  const icons = { GREEN: '◉', YELLOW: '◈', RED: '◆', CRITICAL: '⬟' };
  badge.textContent = `${icons[level] || '◈'} ${level}`;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Auto-connect on load ──────────────────────────────────────────────────────
window.addEventListener('load', () => {
  // Small delay so the user can fill in credentials first if needed
  setTimeout(connectAll, 400);
});

// Re-connect if credentials are changed
['inp-user', 'inp-pass'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    clearAll();
    connectAll();
  });
});
</script>
</body>
</html>
