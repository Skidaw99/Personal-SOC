worker_processes auto;
events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=webhooks:10m rate=120r/m;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript;

  upstream backend  { server backend:8000; }
  upstream frontend { server frontend:80; }
  upstream soc      { server soc:8001; }

  # WebSocket connections must be kept alive for long durations
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # WebSocket channels — SOC service, no rate limit, long-lived connections
    location /ws/ {
      proxy_pass             http://soc;
      proxy_http_version     1.1;
      proxy_set_header       Upgrade $http_upgrade;
      proxy_set_header       Connection $connection_upgrade;
      proxy_set_header       Host $host;
      proxy_set_header       X-Real-IP $remote_addr;
      proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout     3600s;   # keep-alive for long-lived WS connections
      proxy_send_timeout     3600s;
      proxy_buffering        off;     # disable response buffering for real-time
    }

    # Webhook endpoints — higher rate limit, no auth stripping
    location ~ ^/api/webhooks/ {
      limit_req zone=webhooks burst=20 nodelay;
      proxy_pass         http://backend;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }

    # SOC API routes — must be before /api/ to match first
    location /api/soc/ {
      proxy_pass         http://soc;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 60s;
    }

    # API routes
    location /api/ {
      limit_req zone=api burst=10 nodelay;
      proxy_pass         http://backend;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }

    # Health check
    location /health {
      proxy_pass http://backend;
      access_log off;
    }

    # Static pages (Meta App Review)
    location /security-app {
      alias /usr/share/nginx/html/security-app.html;
    }

    location /privacy-policy {
      alias /usr/share/nginx/html/privacy-policy.html;
    }

    location /terms {
      alias /usr/share/nginx/html/terms.html;
    }

    location /data-deletion {
      alias /usr/share/nginx/html/data-deletion.html;
    }

    # Frontend (SPA)
    location / {
      proxy_pass         http://frontend;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_read_timeout 30s;
    }
  }
}
